name: NGI Analiz Araci Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Kutuphanelerin Kurulmasi
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install customtkinter
        pip install numpy
        pip install scipy
        pip install matplotlib
        pip install pillow
        pip install reportlab

    - name: EXE Olusturma
      run: >-
        python -m PyInstaller --onefile --noconsole
        --icon=icon.ico
        --name="NGI_Analiz_Araci"
        --add-data "icon.ico;."
        --add-data "DejaVuSans.ttf;."
        --add-data "DejaVuSans-Bold.ttf;."
        --hidden-import scipy.stats
        --hidden-import scipy.special
        --hidden-import matplotlib.backends.backend_tkagg
        --hidden-import reportlab
        --hidden-import reportlab.lib
        --hidden-import reportlab.lib.pagesizes
        --hidden-import reportlab.lib.colors
        --hidden-import reportlab.lib.units
        --hidden-import reportlab.lib.styles
        --hidden-import reportlab.lib.enums
        --hidden-import reportlab.platypus
        --hidden-import reportlab.platypus.tables
        --hidden-import reportlab.platypus.flowables
        --hidden-import reportlab.pdfbase
        --hidden-import reportlab.pdfbase.ttfonts
        --hidden-import reportlab.pdfbase.pdfmetrics
        --collect-all customtkinter
        --collect-all matplotlib
        --collect-all reportlab
        ngi_citdas.py

    - name: EXE Dosyasini Kaydet
      uses: actions/upload-artifact@v4
      with:
        name: NGI_Analiz_Programi_Guncel
        path: dist/*.exe
